version: '3.8'

services:
  # MySQL Database (internal only - no host port exposed)
  db:
    image: mysql:8.0
    container_name: asamblea-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: America/Asuncion
    volumes:
      - asamblea_mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    networks:
      - asamblea-network
    command: >
      --innodb-buffer-pool-size=512M --innodb-flush-log-at-trx-commit=2 --innodb-flush-method=O_DIRECT --max-connections=200 --thread-cache-size=16 --table-open-cache=2000 --sort-buffer-size=4M --read-buffer-size=1M --performance-schema=OFF --default-time-zone=-03:00
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # NO ports exposed to host - only accessible within Docker network

    # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: asamblea-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081" # Port 8081 on host (localhost only) -> 8081 in container

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/asamblea_db?createDatabaseIfNotExist=true&serverTimezone=America/Asuncion&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      BACKUP_DIRECTORY: /app/uploads/backups
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+UseStringDeduplication -Dbackup.directory=/app/uploads/backups"
    deploy:
      resources:
        limits:
          memory: 1536M
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asamblea-network
      - proxy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/configuracion" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=true"
      # Backend API Router - asamblea.cloud/api
      - "traefik.http.routers.asamblea-backend.rule=Host(`asamblea.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.asamblea-backend.entrypoints=websecure"
      - "traefik.http.routers.asamblea-backend.tls=true"
      - "traefik.http.routers.asamblea-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asamblea-backend.service=asamblea-backend"
      - "traefik.http.routers.asamblea-backend.middlewares=global-compress"
      - "traefik.http.services.asamblea-backend.loadbalancer.server.port=8081"

  # Next.js Frontend - Production Mode (Optimized)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://asamblea.cloud
    container_name: asamblea-frontend
    restart: unless-stopped
    # ports:
    #   - "127.0.0.1:6002:6001"
    environment:
      NEXT_PUBLIC_API_URL: https://asamblea.cloud
      NODE_ENV: production
      PORT: 6001
      HOSTNAME: "0.0.0.0"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:6001" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - asamblea-network
      - proxy
    labels:
      - "traefik.enable=true"
      # Frontend Router - asamblea.cloud
      - "traefik.http.routers.asamblea-frontend.rule=Host(`asamblea.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.asamblea-frontend.entrypoints=websecure"
      - "traefik.http.routers.asamblea-frontend.tls=true"
      - "traefik.http.routers.asamblea-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asamblea-frontend.service=asamblea-frontend"
      # Security Headers
      - "traefik.http.routers.asamblea-frontend.middlewares=asamblea-security,global-compress"
      - "traefik.http.services.asamblea-frontend.loadbalancer.server.port=6001"
      - "traefik.http.middlewares.asamblea-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.asamblea-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.asamblea-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.asamblea-security.headers.frameDeny=true"
      - "traefik.http.middlewares.asamblea-security.headers.contentTypeNosniff=true"
      # WWW redirect
      - "traefik.http.routers.asamblea-www.rule=Host(`www.asamblea.cloud`)"
      - "traefik.http.routers.asamblea-www.entrypoints=websecure"
      - "traefik.http.routers.asamblea-www.tls=true"
      - "traefik.http.routers.asamblea-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asamblea-www.middlewares=asamblea-www-redirect"
      - "traefik.http.middlewares.asamblea-www-redirect.redirectregex.regex=^https://www\\.asamblea\\.cloud/(.*)"
      - "traefik.http.middlewares.asamblea-www-redirect.redirectregex.replacement=https://asamblea.cloud/$${1}"
      - "traefik.http.middlewares.asamblea-www-redirect.redirectregex.permanent=true"

networks:
  asamblea-network:
    driver: bridge
    name: asamblea-network
  proxy:
    external: true

volumes:
  asamblea_mysql_data:
    name: asamblea_mysql_data
